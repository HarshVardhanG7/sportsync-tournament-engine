services:
  postgres:
    image: postgres:16-alpine
    container_name: sportsync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sportsync
      POSTGRES_PASSWORD: sportsync
      POSTGRES_DB: sportsync
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportsync -d sportsync"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
